<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <title>Cérebro Interativo</title>
  <style>

    body {
      font-family: Arial, sans-serif;
      background-color: #fbfcfe;
      margin: 0;
      padding: 0;
    }

    h1 {
      font-family: 'Abril Fatface', serif;
      font-size: 42px;                    
      color: #297731;
      text-align: center;
      margin: 20px 0;
    }
    
     .tela-inicial {
      text-align: center;
      padding: 30px;
    }

  .imagem-corpo {
    display: block;
    height:  calc(100vh - 120px);
    width: auto;
    margin: 0 auto;
  }

    #btnAbrirCerebro {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background-color: #527399;
      color: white;
    }

    #btnAbrirCerebro:hover {
      background-color: #527399;
    }

    #btnAbrirCardio {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background-color: #527399;
      color: white;
    }

    #btnAbrirCardio:hover {
      background-color: #527399;
    }

    .brain-container {
      position: relative;
      width: 800px;
      margin: 40px auto;
    }
    .brain-container img {
      width: 100%;
      display: block;
    }

    .region-btn {
      position: absolute;
      background: rgba(255,255,255,0.3);
      border: none;
      cursor: pointer;
      border-radius: 50%;
    }
    .region-btn:hover {
      background: rgba(255,204,0,0.6);
    }

    #janelaCerebro {
      padding-bottom: 100px;
    }

    #janelaCardio {
      padding-bottom: 100px;
    }

    .tela-inicial {
      position: relative;
      text-align: center;
      padding: 30px;
      transition: transform 0.4s ease;
    }

    .tela-inicial.deslocada {
      transform: translateX(-30%) scale(0.9);
      opacity: 0.9;
    }

    .corpo-container{
      position: relative;
      display: inline-block;
    }

    .anotacoes{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
    }

    .linha-anatomia{
      stroke:#000000;
      stroke-width:3;
    }

    .ponto-anatomia{
      fill:#000000;
    }

    .label-anatomia{
      position:absolute;

      background:white;
      border:none;

      border-radius:30px;

      padding:12px 18px;

      font-size:16px;
      font-weight:600;

      box-shadow:0 4px 15px rgba(0,0,0,.12);

      cursor:pointer;
    }

    .label-anatomia:hover{
      transform:translateY(-2px);
    }

    .cerebro{
      top:8%;
      left:65%;
    }

    .cardio{
      top:34%;
      left:68%;
    }

    .modal-cerebro{
      position: fixed;

      top: 50%;
      left: 65%;

      width: 80%;
      max-width: 1000px;
      height: 80vh;

      background: white;

      border-radius: 25px;

      box-shadow: 0 15px 50px rgba(0,0,0,.25);

      z-index: 1000;

      overflow: auto;

      visibility: hidden;
      opacity: 0;

      transform: translate(-50%, -50%) scale(0);

      transition: .4s ease;
    }

    .modal-cerebro.ativo{
      visibility: visible;
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .cardio-container {
      text-align: center;
      margin-top: 20px;
    }

    .cardio-container img {
      max-width: 90%;
      max-height: 68vh;
      width: auto;
      height: auto;
}

    .modal-cardio{
      position: fixed;

      top: 50%;
      left: 70%;

      width: 80%;
      max-width: 1000px;
      height: 80vh;

      background: white;

      border-radius: 25px;

      box-shadow: 0 15px 50px rgba(0,0,0,.25);

      z-index: 1000;

      overflow: auto;

      visibility: hidden;
      opacity: 0;

      transform: translate(-50%, -50%) scale(0);

      transition: .4s ease;
    }

    .modal-cardio.ativo{
      visibility: visible;
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }


    .overlay{
      position: fixed;
      inset: 0;

      background: rgba(0,0,0,.3);

      z-index: 999;

      display:none;
    }

    .overlay.ativo{
      display:block;
    }

    .fechar{
      position:absolute;

      top:15px;
      right:20px;

      border:none;
      background:none;

      font-size:28px;

      cursor:pointer;
    }

    #infoBox {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #fff;
      border-top: 2px solid #ccc;
      padding: 15px;
      box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
      display: none;
    }
  </style>
</head>
<body>
  <div class="tela-inicial">
  <h1>Diagrama do Corpo Humano</h1>

  <div class="corpo-container">

  <img src="CorpoHumano.png"
       alt="Diagrama do corpo humano"
       class="imagem-corpo">

  <svg class="anotacoes" viewBox="0 0 1000 1400">

    <!-- cérebro -->
    <line x1="520" y1="100"
          x2="760" y2="150"
          class="linha-anatomia"/>

    <circle cx="520"
            cy="100"
            r="6"
            class="ponto-anatomia"/>

    <!-- coração -->
    <line x1="520" y1="430"
          x2="760" y2="500"
          class="linha-anatomia"/>

    <circle cx="520"
            cy="430"
            r="6"
            class="ponto-anatomia"/>

      </svg>

    <button id="btnAbrirCerebro"
            class="label-anatomia cerebro">
      Cérebro
        </button>

    <button id="btnAbrirCardio"
            class="label-anatomia cardio">
      Cardiovascular
    </button>

    </div> 

</div>

  <div id="overlayCerebro" class="overlay"></div>
  <div id="janelaCerebro" class="modal-cerebro">
  <button id="fecharCerebro" class="fechar">
    ✕
  </button>

  <h1>Cérebro Interativo</h1>


  <div class="brain-container">
    <img src="ImagemCerebro1.png" alt="Cérebro">

    <!-- Azul claro -->
  <button id="cpfdlBtn" class="region-btn" 
    style="top: 155px; left: 452px; width: 120px; height: 70px; background: rgba(173, 216, 230, 0.5);"></button>

  <!-- Verde claro -->
  <button id="ccaBtn" class="region-btn" 
    style="top: 50px; left: 18px;  width: 150px; height: 70px; background: rgba(144, 238, 144, 0.5);"></button>
  <!-- Amarelo -->
  <button id="accumbensBtn" class="region-btn" 
   style="top: 340px; left: 510px;  width: 120px; height: 70px; background: rgba(255, 255, 0, 0.5);"></button>
  <!-- Laranja -->
  <button id="amigdalaBtn" class="region-btn" 
    style="top: 340px; left: 130px;  width: 100px; height: 60px; background: rgba(255, 165, 0, 0.5);"></button>
  <!-- Cinza -->
  <button id="scpBtn" class="region-btn" 
    style="top: 285px; left: 35px;  width: 120px; height: 80px; background: rgba(128, 128, 128, 0.5);"></button>

  </div>
  </div>

  <div id="overlayCardio" class="overlay"></div>

  <div id="janelaCardio" class="modal-cardio">

    <button id="fecharCardio" class="fechar">
      ✕
    </button>

    <h1>Sistema Cardiovascular</h1>

    <div class="cardio-container">
      <img src="Cardiovascular.png"
          alt="Sistema Cardiovascular">
    </div>

</div>

  <div id="infoBox"></div>

  <script>
    const infoBox = document.getElementById("infoBox");
    const telaInicial = document.querySelector(".tela-inicial");
    const janelaCerebro = document.getElementById("janelaCerebro");
    const btnAbrirCerebro = document.getElementById("btnAbrirCerebro");
    const janelaCardio = document.getElementById("janelaCardio");
    const btnAbrirCardio = document.getElementById("btnAbrirCardio");

    const overlayCerebro = document.getElementById("overlayCerebro");

    const fecharCerebro = document.getElementById("fecharCerebro");

    btnAbrirCerebro.addEventListener("click", () => {

      telaInicial.classList.add("deslocada");

      overlayCerebro.classList.add("ativo");
      janelaCerebro.classList.add("ativo");

    });

    fecharCerebro.addEventListener("click", () => {

      telaInicial.classList.remove("deslocada");

      overlayCerebro.classList.remove("ativo");
      janelaCerebro.classList.remove("ativo");

    });

    const overlayCardio = document.getElementById("overlayCardio");

    const fecharCardio = document.getElementById("fecharCardio");

    btnAbrirCardio.addEventListener("click", () => {

      telaInicial.classList.add("deslocada");

      overlayCardio.classList.add("ativo");
      janelaCardio.classList.add("ativo");

    });

    fecharCardio.addEventListener("click", () => {

      telaInicial.classList.remove("deslocada");

      overlayCardio.classList.remove("ativo");
      janelaCardio.classList.remove("ativo");

    });

    document.getElementById("cpfdlBtn").addEventListener("click", () => {
      infoBox.style.display = "block";
      infoBox.innerHTML = "<h2>Córtex Pré-Frontal Dorsolateral (CPFDL)</h2><p>Modula a expectativa de melhora; sua integridade é indispensável, justificando a perda do efeito placebo na Doença de Alzheimer.</p>";
    });

    document.getElementById("ccaBtn").addEventListener("click", () => {
      infoBox.style.display = "block";
      infoBox.innerHTML = "<h2>Córtex Cingulado Anterior (CCA)</h2><p>Integra os componentes afetivo e nociceptivo, recrutando redes antinociceptivas subcorticais.</p>";
    });

    document.getElementById("accumbensBtn").addEventListener("click", () => {
      infoBox.style.display = "block";
      infoBox.innerHTML = "<h2>Núcleo Accumbens (Dopamina)</h2><p>Eixo do sistema de recompensa mesolímbico. A antecipação do alívio induz o disparo da Área Tegmentar Ventral (ATV), liberando dopamina no Accumbens.</p>";
    });

    document.getElementById("amigdalaBtn").addEventListener("click", () => {
      infoBox.style.display = "block";
      infoBox.innerHTML = "<h2>Amígdala</h2><p>Processa as respostas de medo e estresse; sua atenuação reduz o impacto fisiológico da patologia.</p>";
    });

    document.getElementById("scpBtn").addEventListener("click", () => {
      infoBox.style.display = "block";
      infoBox.innerHTML = "<h2>Substância Cinzenta Periaquedutal (SCP - Endorfina)</h2><p>Ativada por eferências corticais, coordena a via inibidora descendente via secreção de β-endorfinas e encefalinas, bloqueando o sinal álgico na medula.</p>";
    });
  </script>
</body>
</html>
